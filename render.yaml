databases:
  - name: inclusive-classroom-db
    plan: free
    databaseName: inclusive_classroom
    user: inclusive_classroom

services:
  - type: web
    name: inclusive-classroom
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn inclusive_classroom.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inclusive-classroom-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 4