<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inclusive Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b; --bg: #f1f5f9;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #1d4ed8 0%, #4f46e5 50%, #7c3aed 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: white; border-radius: 20px; width: 100%; max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.2); overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1d4ed8, #4f46e5);
            padding: 32px 28px 24px; text-align: center;
        }
        .login-logo {
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(255,255,255,0.15); display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; margin: 0 auto 14px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .login-header h2 { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:800; color:white; margin-bottom:4px; }
        .login-header p  { font-size:0.82rem; color:rgba(255,255,255,0.75); }
        .login-body { padding: 28px; }
        .f-label { font-size:0.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
        .f-group { margin-bottom:18px; }
        .form-control {
            width:100%; padding:10px 13px; border-radius:10px;
            border:1.5px solid var(--border); font-family:inherit; font-size:0.875rem;
            font-weight:500; outline:none; background:white; color:var(--text); transition:border-color 0.15s;
        }
        .form-control:focus { border-color:var(--primary); }
        .pw-wrap { position:relative; }
        .pw-wrap .form-control { padding-right:42px; }
        .pw-toggle {
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; color:var(--text-muted);
            font-size:0.95rem; padding:0; display:flex; align-items:center; transition:color 0.15s;
        }
        .pw-toggle:hover { color:var(--primary); }
        .btn-login {
            width:100%; padding:11px; background:var(--primary); color:white;
            border:none; border-radius:10px; font-family:inherit; font-weight:800;
            font-size:0.9rem; cursor:pointer; transition:background 0.15s; margin-top:4px;
        }
        .btn-login:hover { background:var(--primary-dark); }
        .alert-danger-bar {
            padding:10px 13px; border-radius:9px; margin-bottom:16px;
            font-size:0.82rem; font-weight:600; background:#fef2f2; color:#991b1b;
            border:1px solid #fecaca; display:flex; align-items:center; gap:7px;
        }
        .login-footer { text-align:center; padding:0 28px 24px; font-size:0.75rem; color:var(--text-muted); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="login-logo">📚</div>
        <h2>Inclusive Classroom</h2>
        <p>Sign in to your account to continue</p>
    </div>
    <div class="login-body">
        {% if messages %}
            {% for message in messages %}
            <div class="alert-danger-bar"><i class="bi bi-exclamation-circle-fill"></i>{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="f-group">
                <label class="f-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="Enter your username">
            </div>
            <div class="f-group">
                <label class="f-label">Password</label>
                <div class="pw-wrap">
                    <input type="password" name="password" id="pw-login" class="form-control" required placeholder="Enter your password">
                    <button type="button" class="pw-toggle" onclick="togglePw('pw-login',this)"><i class="bi bi-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
        </form>
    </div>
    <div class="login-footer">Inclusive Classroom Learning Management System</div>
</div>
<script>
function togglePw(id, btn) {
    const f = document.getElementById(id);
    const i = btn.querySelector('i');
    if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
    else { f.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
