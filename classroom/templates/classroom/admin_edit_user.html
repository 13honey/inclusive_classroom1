<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Account - Inclusive Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; }
        .navbar { background: #1e1b4b; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { color: white; font-weight: 800; font-size: 1rem; text-decoration: none; }
        .btn-back { color: #a5b4fc; font-size: 0.82rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .btn-back:hover { color: white; }
        .card { border: none; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 960px; margin: 40px auto; background: white; overflow: hidden; }
        .card-header { background: #1e1b4b; padding: 20px 28px; }
        .card-header h2 { color: white; font-size: 1rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 8px; }
        .card-header p { color: #a5b4fc; font-size: 0.8rem; margin: 4px 0 0; }
        .card-body { padding: 28px; }
        .edit-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 24px; align-items: start; }
        label { font-weight: 700; color: #374151; font-size: 0.85rem; display: block; margin-bottom: 6px; }
        .form-control, .form-select { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 10px 14px; font-size: 0.875rem; font-family: inherit; width: 100%; transition: border-color 0.15s; }
        .form-control:focus, .form-select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .mb-3 { margin-bottom: 16px; }
        .section-box { background: #fff7ed; border: 1.5px solid #fed7aa; border-radius: 12px; padding: 18px; }
        .section-title { font-weight: 800; color: #c2410c; font-size: 0.85rem; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .section-box small { color: #9a3412; font-size: 0.78rem; }
        .password-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 0.82rem; font-weight: 700; color: #9a3412; cursor: pointer; }
        .password-toggle input { width: 16px; height: 16px; accent-color: #f59e0b; }
        .password-fields.is-disabled { opacity: 0.55; }
        .password-fields.is-disabled input { background: #f8fafc; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { border-radius: 10px; font-weight: 700; font-size: 0.875rem; padding: 10px 20px; border: none; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-save { background: #f59e0b; color: white; }
        .btn-save:hover { background: #d97706; color: white; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-cancel:hover { background: #e2e8f0; color: #475569; }
        .alert { border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.875rem; font-weight: 600; }
        .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        @media (max-width: 820px) {
            .card { max-width: 520px; margin: 24px auto; }
            .edit-grid { grid-template-columns: 1fr; }
            .card-body { padding: 22px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand">Inclusive Classroom</span>
    <a href="{% url 'admin_dashboard' %}" class="btn-back"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h2><i class="bi bi-pencil-fill"></i> Edit Account</h2>
            <p>Updating account for {{ profile.user.username }}</p>
        </div>
        <div class="card-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if 'error' in message.tags %}alert-danger{% else %}alert-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}
                <div class="edit-grid">
                    <div>
                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" name="username" class="form-control" value="{{ profile.user.username }}" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" value="{{ profile.user.email }}" autocomplete="off">
                        </div>
                        <div class="mb-3">
                            <label>Role</label>
                            <select name="role" class="form-select" id="role-select" onchange="toggleStudentFields()">
                                <option value="student" {% if profile.role == 'student' %}selected{% endif %}>Student</option>
                                {% if profile.role == 'teacher' or not other_teacher_exists %}
                                    <option value="teacher" {% if profile.role == 'teacher' %}selected{% endif %}>SPED Teacher</option>
                                {% endif %}
                                {% if profile.role == 'admin' or not other_admin_exists %}
                                    <option value="admin" {% if profile.role == 'admin' %}selected{% endif %}>Admin</option>
                                {% endif %}
                            </select>
                        </div>
                        <div class="mb-3" id="student-fields" style="display:none;">
                            <label>Linked SPED Teacher</label>
                            <select name="assigned_teacher" class="form-select" id="assigned-teacher">
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.id }}" {% if student_record.assigned_teacher_id == teacher.id %}selected{% endif %}>{{ teacher.username }}</option>
                                {% empty %}
                                    <option value="">No teachers available</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="section-box">
                        <div class="section-title"><i class="bi bi-key-fill"></i> Password Section</div>
                        <label class="password-toggle">
                            <input type="checkbox" name="reset_password" id="reset-password" onchange="togglePasswordFields()">
                            Change this account password
                        </label>
                        <div class="password-fields is-disabled" id="password-fields">
                            <div class="mb-3">
                                <label>New Password</label>
                                <input type="password" name="new_password" id="new-password" class="form-control" placeholder="Enter new password" autocomplete="new-password" disabled>
                            </div>
                            <div class="mb-3">
                                <label>Confirm New Password</label>
                                <input type="password" name="confirm_password" id="confirm-password" class="form-control" placeholder="Repeat new password" autocomplete="new-password" disabled>
                            </div>
                        </div>
                        <small>Keep unchecked when updating only the username, email, or role.</small>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-save"><i class="bi bi-check-lg"></i> Save Changes</button>
                    <a href="{% url 'admin_user_list' %}" class="btn btn-cancel"><i class="bi bi-x-lg"></i> Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleStudentFields(){
    const isStudent = document.getElementById('role-select').value === 'student';
    const fields = document.getElementById('student-fields');
    const teacher = document.getElementById('assigned-teacher');
    fields.style.display = isStudent ? 'block' : 'none';
    teacher.required = isStudent;
}

function togglePasswordFields(){
    const enabled = document.getElementById('reset-password').checked;
    const fields = document.getElementById('password-fields');
    const passwordInputs = fields.querySelectorAll('input');
    fields.classList.toggle('is-disabled', !enabled);
    passwordInputs.forEach((input) => {
        input.disabled = !enabled;
        input.required = enabled;
        if (!enabled) input.value = '';
    });
}

document.addEventListener('DOMContentLoaded', () => {
    toggleStudentFields();
    togglePasswordFields();
});
</script>
</body>
</html>
