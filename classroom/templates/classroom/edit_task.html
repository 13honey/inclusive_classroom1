<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task - Inclusive Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0f4ff; }
        .navbar { background: linear-gradient(135deg, #1a73e8, #0d47a1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); max-width: 600px; margin: 40px auto; }
        .card-header { background: white; border-bottom: 2px solid #f0f4ff; border-radius: 16px 16px 0 0 !important; font-weight: 800; color: #1a73e8; padding: 16px 20px; }
        label { font-weight: 700; color: #555; }
        .btn { border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
  <div class="container-fluid px-4">
    <span class="navbar-brand">📚 Inclusive Classroom</span>
    <a href="{% url 'student_detail' student.id %}" class="btn btn-outline-light btn-sm">← Back</a>
  </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">✏️ Edit Task — {{ task.title }}</div>
        <div class="card-body p-4">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Task Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                </div>
                <div class="mb-3">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ task.description|default:"" }}</textarea>
                </div>
                <div class="mb-3">
                    <label>Deadline <span class="text-danger">*</span></label>
                    <input type="datetime-local" name="deadline" class="form-control"
                           value="{{ task.deadline|date:'Y-m-d' }}T{{ task.deadline|date:'H:i' }}" required>
                </div>
                <div class="mb-3">
                    <label>YouTube / Video Link</label>
                    <input type="url" name="video_url" class="form-control" value="{{ task.video_url|default:'' }}" placeholder="https://youtube.com/...">
                </div>
                <div class="mb-3">
                    <label>Upload New Video File</label>
                    {% if task.video_file %}
                        <div class="mb-1">
                            <a href="{{ task.video_file.url }}" target="_blank" class="btn btn-outline-secondary btn-sm">View Current Video</a>
                        </div>
                    {% endif %}
                    <input type="file" name="video_file" class="form-control" accept="video/*">
                </div>
                <div class="mb-3">
                    <label>Upload New Attachment</label>
                    {% if task.attachment %}
                        <div class="mb-1">
                            <a href="{{ task.attachment.url }}" target="_blank" class="btn btn-outline-secondary btn-sm">View Current Attachment</a>
                        </div>
                    {% endif %}
                    <input type="file" name="attachment" class="form-control">
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-warning px-4">Save Changes</button>
                    <a href="{% url 'student_detail' student.id %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
