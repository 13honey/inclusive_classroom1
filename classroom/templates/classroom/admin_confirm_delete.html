<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0f4ff; }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); max-width: 480px; margin: 60px auto; }
        .card-header { background: white; border-bottom: 2px solid #f0f4ff; border-radius: 16px 16px 0 0 !important; font-weight: 800; color: #ea4335; padding: 16px 20px; }
        .btn { border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
  <div class="container-fluid px-4">
    <span class="navbar-brand">🏫 Inclusive Classroom</span>
    <a href="{% url 'admin_user_list' %}" class="btn btn-outline-light btn-sm">← Back</a>
  </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header">🗑️ Confirm Delete User</div>
        <div class="card-body p-4 text-center">
            <p class="mb-4">Are you sure you want to delete user <strong>{{ profile.user.username }}</strong>
            ({{ profile.role }})?<br>
            <span class="text-muted" style="font-size:0.9rem;">This cannot be undone.</span></p>
            <form method="POST">
                {% csrf_token %}
                <a href="{% url 'admin_user_list' %}" class="btn btn-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
